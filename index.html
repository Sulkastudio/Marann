<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joyeux 30 ans Marann</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Quicksand:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- ===== OPENING ANIMATION ===== -->
    <div class="opening-overlay" id="openingOverlay">
      <div class="flames-container">
        <div class="flame flame-purple" style="--left:-3%;--w:18vw;--h:55%;--delay:0s;--dur:2s"></div>
        <div class="flame flame-pink" style="--left:7%;--w:15vw;--h:72%;--delay:0.08s;--dur:1.8s"></div>
        <div class="flame flame-yellow" style="--left:17%;--w:20vw;--h:48%;--delay:0.16s;--dur:2.2s"></div>
        <div class="flame flame-pink" style="--left:28%;--w:16vw;--h:82%;--delay:0.04s;--dur:1.9s"></div>
        <div class="flame flame-orange" style="--left:38%;--w:18vw;--h:52%;--delay:0.12s;--dur:2.1s"></div>
        <div class="flame flame-purple" style="--left:48%;--w:15vw;--h:68%;--delay:0.18s;--dur:1.7s"></div>
        <div class="flame flame-yellow" style="--left:56%;--w:20vw;--h:56%;--delay:0.02s;--dur:2.3s"></div>
        <div class="flame flame-pink" style="--left:66%;--w:17vw;--h:76%;--delay:0.1s;--dur:1.85s"></div>
        <div class="flame flame-purple" style="--left:76%;--w:16vw;--h:46%;--delay:0.14s;--dur:2s"></div>
        <div class="flame flame-pink" style="--left:86%;--w:20vw;--h:62%;--delay:0.06s;--dur:2.15s"></div>
      </div>
      <p class="opening-message" id="openingMessage">Joyeux 30 ans Marann 🎉</p>
    </div>

    <!-- ===== FLOATING STICKERS ===== -->

    <!-- 1 · Rainbow heart "Burn Patriarchy" -->
    <div class="sticker sticker-1" aria-hidden="true">
      <svg viewBox="0 0 120 115" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="hg" cx="45%" cy="55%" r="60%">
            <stop offset="0%"   stop-color="#ffb8e8"/>
            <stop offset="28%"  stop-color="#ff80cc"/>
            <stop offset="52%"  stop-color="#c45cff"/>
            <stop offset="75%"  stop-color="#7b6bff"/>
            <stop offset="100%" stop-color="#4fc8ff"/>
          </radialGradient>
        </defs>
        <!-- soft outer glow -->
        <path d="M60 108C60 108 4 70 4 36C4 18 16 6 32 6C44 6 54 14 60 24C66 14 76 6 88 6C104 6 116 18 116 36C116 70 60 108 60 108Z" fill="#e8b0ff" opacity="0.22" transform="translate(0 5) scale(1.05)" style="transform-origin:60px 57px"/>
        <!-- main heart -->
        <path d="M60 108C60 108 4 70 4 36C4 18 16 6 32 6C44 6 54 14 60 24C66 14 76 6 88 6C104 6 116 18 116 36C116 70 60 108 60 108Z" fill="url(#hg)"/>
        <!-- inner white shine -->
        <path d="M60 94C60 94 18 68 18 39C18 27 26 17 36 17C44 17 52 23 58 33C62 23 68 17 78 17C90 17 98 27 98 39C98 68 60 94 60 94Z" fill="#fff" opacity="0.16"/>
        <!-- highlight sparkle top-left -->
        <path d="M28 20L29.5 26L35.5 24L30 29L32.5 35L28 30L23.5 35L26 29L20.5 24L26.5 26Z" fill="#fff" opacity="0.85"/>
        <!-- floating dots -->
        <circle cx="94" cy="22" r="4" fill="#fff" opacity="0.65"/>
        <circle cx="38" cy="84" r="3" fill="#fff" opacity="0.45"/>
        <circle cx="82" cy="78" r="2.5" fill="#fff" opacity="0.45"/>
        <!-- text: airy Caveat -->
        <text x="60" y="57" text-anchor="middle" font-family="Caveat,cursive" font-size="18" font-weight="400" fill="#fff" letter-spacing="1.5" opacity="0.95">Burn</text>
        <text x="60" y="76" text-anchor="middle" font-family="Caveat,cursive" font-size="15" font-weight="400" fill="#fff" letter-spacing="0.5" opacity="0.95">Patriarchy</text>
      </svg>
    </div>

    <!-- 2 · ACAB pill badge -->
    <div class="sticker sticker-2" aria-hidden="true">
      <svg viewBox="0 0 155 70" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#d6f2ff"/>
            <stop offset="100%" stop-color="#a8dff8"/>
          </linearGradient>
        </defs>
        <!-- pill shape, no stroke -->
        <rect x="0" y="0" width="155" height="70" rx="35" fill="url(#bg2)"/>
        <!-- top sheen -->
        <rect x="14" y="8" width="127" height="20" rx="10" fill="#fff" opacity="0.32"/>
        <!-- text -->
        <text x="70" y="47" text-anchor="middle" font-family="Quicksand,sans-serif" font-size="30" font-weight="800" fill="#2a5f9e" letter-spacing="3">ACAB</text>
        <!-- star -->
        <path d="M132 9L134.4 16.8H142.5L136.1 21.2L138.5 29L132 24.6L125.5 29L127.9 21.2L121.5 16.8H129.6Z" fill="#ffe45d"/>
        <circle cx="132" cy="19" r="3.5" fill="#fff" opacity="0.55"/>
        <!-- small dot accents -->
        <circle cx="20" cy="52" r="5.5" fill="#5bcefa" opacity="0.55"/>
        <circle cx="20" cy="52" r="2.5" fill="#fff" opacity="0.7"/>
      </svg>
    </div>

    <!-- 3 · Rainbow with fluffy clouds -->
    <div class="sticker sticker-3" aria-hidden="true">
      <svg viewBox="0 0 130 92" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="rc">
            <rect x="0" y="0" width="130" height="73"/>
          </clipPath>
        </defs>
        <!-- rainbow arcs, drawn outermost first, sweep=0 = upward -->
        <g clip-path="url(#rc)">
          <path d="M10 72 A55 55 0 0 0 120 72" stroke="#ff6060" stroke-width="9" fill="none" stroke-linecap="butt"/>
          <path d="M17 72 A48 48 0 0 0 113 72" stroke="#ffa040" stroke-width="9" fill="none" stroke-linecap="butt"/>
          <path d="M24 72 A41 41 0 0 0 106 72" stroke="#ffe050" stroke-width="9" fill="none" stroke-linecap="butt"/>
          <path d="M31 72 A34 34 0 0 0  99 72" stroke="#60dd60" stroke-width="9" fill="none" stroke-linecap="butt"/>
          <path d="M38 72 A27 27 0 0 0  92 72" stroke="#50c8f8" stroke-width="9" fill="none" stroke-linecap="butt"/>
          <path d="M45 72 A20 20 0 0 0  85 72" stroke="#c060f8" stroke-width="9" fill="none" stroke-linecap="butt"/>
        </g>
        <!-- left cloud cluster -->
        <ellipse cx="18"  cy="74" rx="18" ry="13" fill="#fff"/>
        <ellipse cx="8"   cy="71" rx="12" ry="10" fill="#fff"/>
        <ellipse cx="28"  cy="71" rx="13" ry="9"  fill="#fff"/>
        <!-- right cloud cluster -->
        <ellipse cx="112" cy="74" rx="18" ry="13" fill="#fff"/>
        <ellipse cx="122" cy="71" rx="12" ry="10" fill="#fff"/>
        <ellipse cx="102" cy="71" rx="13" ry="9"  fill="#fff"/>
        <!-- sparkle above -->
        <path d="M65 10L67 18.5L75.5 16.5L68.5 23L71.5 31.5L65 26L58.5 31.5L61.5 23L54.5 16.5L63 18.5Z" fill="#ffe45d" opacity="0.9"/>
      </svg>
    </div>

    <!-- 4 · Trans flag -->
    <div class="sticker sticker-4" aria-hidden="true">
      <svg viewBox="0 0 110 76" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><clipPath id="tf"><rect x="0" y="0" width="110" height="76" rx="14"/></clipPath></defs>
        <g clip-path="url(#tf)">
          <rect x="0" y="0"    width="110" height="15.2" fill="#5bcefa"/>
          <rect x="0" y="15.2" width="110" height="15.2" fill="#f5a9b8"/>
          <rect x="0" y="30.4" width="110" height="15.2" fill="#fff"/>
          <rect x="0" y="45.6" width="110" height="15.2" fill="#f5a9b8"/>
          <rect x="0" y="60.8" width="110" height="15.2" fill="#5bcefa"/>
          <!-- sheen -->
          <rect x="0" y="0" width="110" height="12" fill="#fff" opacity="0.18"/>
        </g>
        <!-- small heart, no border -->
        <path d="M90 12C90 12 85.5 8.5 85.5 5.5C85.5 3.2 87 2 88.8 2C89.8 2 90 3.2 90 3.5C90 3.2 90.2 2 91.2 2C93 2 94.5 3.2 94.5 5.5C94.5 8.5 90 12 90 12Z" fill="#fff" opacity="0.82"/>
      </svg>
    </div>

    <!-- 5 · Sparkle cluster -->
    <div class="sticker sticker-5" aria-hidden="true">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="sg1" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fffaaa"/>
            <stop offset="100%" stop-color="#ffd84d"/>
          </radialGradient>
          <radialGradient id="sg2" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fde0f0"/>
            <stop offset="100%" stop-color="#ff80b5"/>
          </radialGradient>
          <radialGradient id="sg3" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#d8f4ff"/>
            <stop offset="100%" stop-color="#5bcefa"/>
          </radialGradient>
        </defs>
        <!-- big 4-point star -->
        <path d="M50 5L55 42L92 47L55 52L50 89L45 52L8 47L45 42Z" fill="url(#sg1)"/>
        <!-- inner highlight -->
        <path d="M50 22L53.5 44L72 47L53.5 50L50 72L46.5 50L28 47L46.5 44Z" fill="#fff" opacity="0.42"/>
        <!-- medium star bottom-right -->
        <path d="M77 64L79.8 75.5L91.5 73L82.5 80L86 91.5L77 84L68 91.5L71.5 80L62.5 73L74.2 75.5Z" fill="url(#sg2)"/>
        <!-- colored dots -->
        <circle cx="18" cy="76" r="7" fill="url(#sg3)"/>
        <circle cx="18" cy="76" r="3" fill="#fff" opacity="0.65"/>
        <circle cx="78" cy="15" r="6" fill="#c1f0db"/>
        <circle cx="78" cy="15" r="2.5" fill="#fff" opacity="0.65"/>
        <circle cx="18" cy="20" r="5" fill="#e0c3fc"/>
        <circle cx="18" cy="20" r="2" fill="#fff" opacity="0.65"/>
        <!-- tiny accent dots -->
        <circle cx="90" cy="36" r="3.5" fill="#ffd84d" opacity="0.7"/>
        <circle cx="7"  cy="58" r="3"   fill="#ff9eb5" opacity="0.7"/>
        <circle cx="62" cy="92" r="2.5" fill="#5bcefa" opacity="0.6"/>
      </svg>
    </div>

    <!-- 6 · Pink flame -->
    <div class="sticker sticker-6" aria-hidden="true">
      <svg viewBox="0 0 70 105" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="pf" cx="50%" cy="78%" r="62%">
            <stop offset="0%"   stop-color="#ffe8f5"/>
            <stop offset="40%"  stop-color="#ff9eb5"/>
            <stop offset="100%" stop-color="#f04090"/>
          </radialGradient>
        </defs>
        <!-- base glow -->
        <ellipse cx="35" cy="87" rx="30" ry="14" fill="#ffb8d0" opacity="0.28"/>
        <!-- flame body -->
        <path d="M35 100C35 100 9 80 9 58C9 42 19 32 26 25C26 25 24 37 31 40C31 40 22 24 35 9C35 9 33 26 43 31C43 31 53 23 51 12C60 22 63 39 53 55C58 50 60 42 60 35C65 48 63 69 35 100Z" fill="url(#pf)"/>
        <!-- inner bright core -->
        <path d="M35 86C35 86 20 68 22 54C24 44 29 40 33 35C33 35 31 43 35 46C35 46 40 39 38 28C46 36 48 49 43 60C46 56 48 49 48 44C52 53 51 70 35 86Z" fill="#fff" opacity="0.2"/>
        <!-- tip glow -->
        <ellipse cx="35" cy="18" rx="7" ry="9" fill="#ffe0f0" opacity="0.5"/>
        <!-- sparkles -->
        <circle cx="58" cy="58" r="3.5" fill="#ff80c0" opacity="0.65"/>
        <circle cx="11" cy="52" r="2.5" fill="#ffb8d0" opacity="0.6"/>
        <path d="M61 34L62.5 40L68.5 38L63 44L65.5 50L61 45L56.5 50L59 44L53.5 38L59.5 40Z" fill="#ffd6e8" opacity="0.85"/>
      </svg>
    </div>

    <!-- 7 · Purple flame -->
    <div class="sticker sticker-7" aria-hidden="true">
      <svg viewBox="0 0 70 105" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="vf" cx="50%" cy="78%" r="62%">
            <stop offset="0%"   stop-color="#f0e8ff"/>
            <stop offset="40%"  stop-color="#b57bff"/>
            <stop offset="100%" stop-color="#7a28d8"/>
          </radialGradient>
        </defs>
        <!-- base glow -->
        <ellipse cx="35" cy="87" rx="30" ry="14" fill="#c9a0f0" opacity="0.26"/>
        <!-- flame body -->
        <path d="M35 100C35 100 9 80 9 58C9 42 19 32 26 25C26 25 24 37 31 40C31 40 22 24 35 9C35 9 33 26 43 31C43 31 53 23 51 12C60 22 63 39 53 55C58 50 60 42 60 35C65 48 63 69 35 100Z" fill="url(#vf)"/>
        <!-- inner bright core -->
        <path d="M35 86C35 86 20 68 22 54C24 44 29 40 33 35C33 35 31 43 35 46C35 46 40 39 38 28C46 36 48 49 43 60C46 56 48 49 48 44C52 53 51 70 35 86Z" fill="#fff" opacity="0.18"/>
        <!-- tip glow -->
        <ellipse cx="35" cy="18" rx="7" ry="9" fill="#eedcff" opacity="0.55"/>
        <!-- sparkles -->
        <circle cx="58" cy="58" r="3.5" fill="#9b5eff" opacity="0.65"/>
        <circle cx="11" cy="52" r="2.5" fill="#c0a0f8" opacity="0.6"/>
        <path d="M9 30L10.5 36L16.5 34L11 40L13.5 46L9 41L4.5 46L7 40L1.5 34L7.5 36Z" fill="#dcc8ff" opacity="0.85"/>
      </svg>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <main id="mainContent">

      <!-- GIFT SECTION -->
      <section class="gift-section">
        <div class="gift-box" id="giftBox" role="button" tabindex="0" aria-label="Ouvrir le cadeau">
          <svg viewBox="0 0 160 172" fill="none">
            <rect x="20" y="82" width="120" height="82" rx="6" fill="#e0c3fc" stroke="#222" stroke-width="3"/>
            <rect x="12" y="58" width="136" height="28" rx="6" fill="#d5b8ff" stroke="#222" stroke-width="3"/>
            <rect x="72" y="58" width="16" height="106" fill="#ffd6e0" stroke="#222" stroke-width="2"/>
            <rect x="12" y="66" width="136" height="12" fill="#ffd6e0" stroke="#222" stroke-width="2"/>
            <ellipse cx="66" cy="50" rx="16" ry="12" fill="#ff9eb5" stroke="#222" stroke-width="2.5" transform="rotate(-15 66 50)"/>
            <ellipse cx="94" cy="50" rx="16" ry="12" fill="#ff9eb5" stroke="#222" stroke-width="2.5" transform="rotate(15 94 50)"/>
            <circle cx="80" cy="54" r="6" fill="#ff6b8a" stroke="#222" stroke-width="2"/>
            <path d="M66 58Q57 74 49 68" stroke="#ff9eb5" stroke-width="3" fill="none" stroke-linecap="round"/>
            <path d="M94 58Q103 74 111 68" stroke="#ff9eb5" stroke-width="3" fill="none" stroke-linecap="round"/>
            <circle cx="45" cy="120" r="4" fill="#f0d4ff" opacity="0.5"/>
            <circle cx="115" cy="112" r="3" fill="#f0d4ff" opacity="0.5"/>
            <circle cx="58" cy="145" r="3.5" fill="#f0d4ff" opacity="0.5"/>
            <circle cx="102" cy="138" r="4.5" fill="#f0d4ff" opacity="0.5"/>
          </svg>
        </div>

        <div class="envelopes hidden" id="envelopes">
          <div class="envelope-card" id="env1">
            <div class="envelope-card-inner">
              <div class="envelope-card-front">
                <svg viewBox="0 0 220 155" fill="none" preserveAspectRatio="xMidYMid meet">
                  <rect x="3" y="45" width="214" height="107" rx="8" fill="#c1f0db" stroke="#222" stroke-width="3"/>
                  <path d="M3 45L110 105L217 45" stroke="#222" stroke-width="1.5" opacity="0.15" fill="none"/>
                  <polygon points="3,45 110,5 217,45" fill="#8ddbb5" stroke="#222" stroke-width="3" stroke-linejoin="round"/>
                  <path d="M110 40C110 40 102 33 102 28C102 24 104 22 107 22C109 22 110 24 110 25C110 24 111 22 113 22C116 22 118 24 118 28C118 33 110 40 110 40Z" fill="#ff6b8a" stroke="#222" stroke-width="1.5"/>
                </svg>
              </div>
              <div class="envelope-card-back">
                <p>Un atelier pour créer ta bague en argent</p>
              </div>
            </div>
          </div>
          <div class="envelope-card" id="env2">
            <div class="envelope-card-inner">
              <div class="envelope-card-front">
                <svg viewBox="0 0 220 155" fill="none" preserveAspectRatio="xMidYMid meet">
                  <rect x="3" y="45" width="214" height="107" rx="8" fill="#ffd8be" stroke="#222" stroke-width="3"/>
                  <path d="M3 45L110 105L217 45" stroke="#222" stroke-width="1.5" opacity="0.15" fill="none"/>
                  <polygon points="3,45 110,5 217,45" fill="#ffb38a" stroke="#222" stroke-width="3" stroke-linejoin="round"/>
                  <path d="M110 40C110 40 102 33 102 28C102 24 104 22 107 22C109 22 110 24 110 25C110 24 111 22 113 22C116 22 118 24 118 28C118 33 110 40 110 40Z" fill="#b8e6ff" stroke="#222" stroke-width="1.5"/>
                </svg>
              </div>
              <div class="envelope-card-back">
                <p>Deux places pour King Kong Meuf + Parcours Santé (punk féminin) — 29 Mai</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- EVENT SECTION -->
      <section class="event-section">
        <div class="event-info">
          <span class="event-date">11 — 12 Avril</span>
          <span class="event-dot">✦</span>
          <span class="event-location">Nantes</span>
        </div>
      </section>

      <!-- PEOPLE SECTION -->
      <section class="people-section">
        <div class="people-grid">
          <div class="person-card"><div class="avatar"></div><p>Antoine B</p></div>
          <div class="person-card"><div class="avatar"></div><p>Antoine G</p></div>
          <div class="person-card"><div class="avatar"></div><p>Alice</p></div>
          <div class="person-card"><div class="avatar"></div><p>Henry</p></div>
          <div class="person-card"><div class="avatar"></div><p>Thelma</p></div>
          <div class="person-card"><div class="avatar"></div><p>Anna</p></div>
          <div class="person-card"><div class="avatar"></div><p>Sophie M</p></div>
          <div class="person-card"><div class="avatar"></div><p>Mathieu</p></div>
          <div class="person-card"><div class="avatar"></div><p>Maïlys</p></div>
          <div class="person-card"><div class="avatar"></div><p>Echo</p></div>
          <div class="person-card"><div class="avatar"></div><p>Solène</p></div>
          <div class="person-card"><div class="avatar"></div><p>Sophie C</p></div>
          <div class="person-card"><div class="avatar"></div><p>Tiffany</p></div>
        </div>
      </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
