<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joyeux 30 ans Marann</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Quicksand:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- ===== OPENING ANIMATION ===== -->
    <div class="opening-overlay" id="openingOverlay">
      <div class="flames-container">
        <div class="flame flame-purple" style="--left:-3%;--w:18vw;--h:55%;--delay:0s;--dur:2s"></div>
        <div class="flame flame-pink" style="--left:7%;--w:15vw;--h:72%;--delay:0.08s;--dur:1.8s"></div>
        <div class="flame flame-yellow" style="--left:17%;--w:20vw;--h:48%;--delay:0.16s;--dur:2.2s"></div>
        <div class="flame flame-pink" style="--left:28%;--w:16vw;--h:82%;--delay:0.04s;--dur:1.9s"></div>
        <div class="flame flame-orange" style="--left:38%;--w:18vw;--h:52%;--delay:0.12s;--dur:2.1s"></div>
        <div class="flame flame-purple" style="--left:48%;--w:15vw;--h:68%;--delay:0.18s;--dur:1.7s"></div>
        <div class="flame flame-yellow" style="--left:56%;--w:20vw;--h:56%;--delay:0.02s;--dur:2.3s"></div>
        <div class="flame flame-pink" style="--left:66%;--w:17vw;--h:76%;--delay:0.1s;--dur:1.85s"></div>
        <div class="flame flame-purple" style="--left:76%;--w:16vw;--h:46%;--delay:0.14s;--dur:2s"></div>
        <div class="flame flame-pink" style="--left:86%;--w:20vw;--h:62%;--delay:0.06s;--dur:2.15s"></div>
      </div>
      <p class="opening-message" id="openingMessage">Joyeux 30 ans Marann 🎉</p>
    </div>

    <!-- ===== FLOATING STICKERS ===== -->

    <!-- Heart with "Burn Patriarchy" -->
    <div class="sticker sticker-1" aria-hidden="true">
      <svg viewBox="0 0 100 95" fill="none">
        <path d="M50 88C50 88 5 58 5 30C5 15 15 5 28 5C38 5 46 12 50 20C54 12 62 5 72 5C85 5 95 15 95 30C95 58 50 88 50 88Z" fill="#ff9eb5" stroke="#222" stroke-width="3" stroke-linejoin="round"/>
        <!-- inner glow -->
        <path d="M50 80C50 80 14 55 14 32C14 21 21 13 30 13C38 13 45 19 50 27C55 19 62 13 70 13C79 13 86 21 86 32C86 55 50 80 50 80Z" fill="#ffccd8" opacity="0.45"/>
        <!-- small sparkles -->
        <path d="M18 18L19.5 22L23.5 18L19.5 14Z" fill="#ff6b8a" opacity="0.6"/>
        <path d="M78 24L79.5 28L83.5 24L79.5 20Z" fill="#ff6b8a" opacity="0.6"/>
        <circle cx="30" cy="65" r="2.5" fill="#fff" opacity="0.5"/>
        <circle cx="68" cy="58" r="2" fill="#fff" opacity="0.5"/>
        <text x="50" y="46" text-anchor="middle" font-family="Quicksand,sans-serif" font-size="12" font-weight="700" fill="#222">Burn</text>
        <text x="50" y="61" text-anchor="middle" font-family="Quicksand,sans-serif" font-size="11" font-weight="700" fill="#222">Patriarchy</text>
      </svg>
    </div>

    <!-- ACAB with star -->
    <div class="sticker sticker-2" aria-hidden="true">
      <svg viewBox="0 0 130 58" fill="none">
        <rect x="2" y="2" width="126" height="54" rx="12" fill="#b8e6ff" stroke="#222" stroke-width="3"/>
        <!-- subtle inner highlight -->
        <rect x="8" y="6" width="114" height="12" rx="6" fill="#fff" opacity="0.3"/>
        <!-- small dots decoration -->
        <circle cx="14" cy="44" r="3" fill="#5bcefa" stroke="#222" stroke-width="1.2"/>
        <circle cx="14" cy="44" r="1.2" fill="#fff"/>
        <text x="60" y="40" text-anchor="middle" font-family="Quicksand,sans-serif" font-size="27" font-weight="800" fill="#222">ACAB</text>
        <!-- star with inner fill -->
        <path d="M112 7L114.2 13.6H121.2L115.7 17.6L117.9 24.2L112 20.2L106.1 24.2L108.3 17.6L102.8 13.6H109.8Z" fill="#ffe45d" stroke="#222" stroke-width="1.5"/>
        <circle cx="112" cy="17" r="2.5" fill="#fff" opacity="0.5"/>
      </svg>
    </div>

    <!-- Raised fist -->
    <div class="sticker sticker-3" aria-hidden="true">
      <svg viewBox="0 0 60 85" fill="none">
        <!-- wrist/arm -->
        <rect x="18" y="52" width="24" height="32" rx="6" fill="#ffcba4" stroke="#222" stroke-width="2.5"/>
        <!-- palm -->
        <rect x="11" y="14" width="38" height="40" rx="11" fill="#ffcba4" stroke="#222" stroke-width="2.5"/>
        <!-- thumb -->
        <rect x="5" y="30" width="13" height="21" rx="6.5" fill="#ffcba4" stroke="#222" stroke-width="2.5"/>
        <!-- finger lines -->
        <line x1="21" y1="18" x2="21" y2="52" stroke="#222" stroke-width="1.5" opacity="0.25"/>
        <line x1="30" y1="16" x2="30" y2="52" stroke="#222" stroke-width="1.5" opacity="0.25"/>
        <line x1="39" y1="18" x2="39" y2="52" stroke="#222" stroke-width="1.5" opacity="0.25"/>
        <!-- knuckle highlights -->
        <ellipse cx="21" cy="18" rx="3.5" ry="2" fill="#fff" opacity="0.35"/>
        <ellipse cx="30" cy="16" rx="3.5" ry="2" fill="#fff" opacity="0.35"/>
        <ellipse cx="39" cy="18" rx="3.5" ry="2" fill="#fff" opacity="0.35"/>
        <!-- cuff band -->
        <rect x="18" y="52" width="24" height="7" rx="3" fill="#e8a88a" stroke="#222" stroke-width="1.5"/>
      </svg>
    </div>

    <!-- Rainbow -->
    <div class="sticker sticker-4" aria-hidden="true">
      <svg viewBox="0 0 110 72" fill="none">
        <!-- clouds on both ends -->
        <ellipse cx="16" cy="60" rx="13" ry="9" fill="#fff" stroke="#222" stroke-width="2"/>
        <ellipse cx="9" cy="58" rx="9" ry="7" fill="#fff" stroke="#222" stroke-width="2"/>
        <ellipse cx="94" cy="60" rx="13" ry="9" fill="#fff" stroke="#222" stroke-width="2"/>
        <ellipse cx="101" cy="58" rx="9" ry="7" fill="#fff" stroke="#222" stroke-width="2"/>
        <!-- rainbow arcs -->
        <path d="M10 62A45 45 0 01100 62" stroke="#ff6b6b" stroke-width="7" stroke-linecap="round"/>
        <path d="M17 62A38 38 0 0193 62" stroke="#ffa500" stroke-width="7" stroke-linecap="round"/>
        <path d="M24 62A31 31 0 0186 62" stroke="#ffe45d" stroke-width="7" stroke-linecap="round"/>
        <path d="M31 62A24 24 0 0179 62" stroke="#7ddf7d" stroke-width="7" stroke-linecap="round"/>
        <path d="M38 62A17 17 0 0172 62" stroke="#5bcefa" stroke-width="7" stroke-linecap="round"/>
        <path d="M45 62A10 10 0 0165 62" stroke="#d28aff" stroke-width="7" stroke-linecap="round"/>
        <!-- sparkle -->
        <path d="M55 14L56.5 20L62 18L57.5 22L60 28L55 24L50 28L52.5 22L48 18L53.5 20Z" fill="#ffe45d" stroke="#222" stroke-width="1"/>
      </svg>
    </div>

    <!-- Cute anarchist A -->
    <div class="sticker sticker-5" aria-hidden="true">
      <svg viewBox="0 0 80 90" fill="none">
        <!-- outer glow ring -->
        <circle cx="40" cy="46" r="28" fill="#ffd6e0" stroke="#ff9eb5" stroke-width="2" opacity="0.5"/>
        <circle cx="40" cy="46" r="22" fill="#ffd6e0" stroke="#222" stroke-width="3"/>
        <!-- anarchist A -->
        <path d="M40 16L22 72M40 16L58 72M26 58H54" stroke="#222" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- decorative dots -->
        <circle cx="67" cy="18" r="5" fill="#ff9eb5" stroke="#222" stroke-width="1.5"/>
        <circle cx="13" cy="72" r="4.5" fill="#b8e6ff" stroke="#222" stroke-width="1.5"/>
        <circle cx="70" cy="68" r="3.5" fill="#ffe45d" stroke="#222" stroke-width="1.2"/>
        <circle cx="10" cy="22" r="3" fill="#c1f0db" stroke="#222" stroke-width="1.2"/>
      </svg>
    </div>

    <!-- Venus symbol with fist -->
    <div class="sticker sticker-6" aria-hidden="true">
      <svg viewBox="0 0 80 112" fill="none">
        <!-- outer decorative ring -->
        <circle cx="40" cy="35" r="31" fill="#f0c8dd" stroke="#ff9eb5" stroke-width="2" opacity="0.4"/>
        <circle cx="40" cy="35" r="26" fill="#e8b4cb" stroke="#222" stroke-width="3"/>
        <!-- inner highlight -->
        <circle cx="40" cy="35" r="18" fill="#f5cfe0" opacity="0.35"/>
        <!-- fist inside circle -->
        <rect x="28" y="22" width="24" height="22" rx="7" fill="#ffcba4" stroke="#222" stroke-width="2"/>
        <rect x="22" y="33" width="9" height="13" rx="4.5" fill="#ffcba4" stroke="#222" stroke-width="2"/>
        <line x1="34" y1="26" x2="34" y2="43" stroke="#222" stroke-width="1.2" opacity="0.25"/>
        <line x1="40" y1="24" x2="40" y2="43" stroke="#222" stroke-width="1.2" opacity="0.25"/>
        <!-- vertical line -->
        <line x1="40" y1="61" x2="40" y2="100" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
        <!-- horizontal cross -->
        <line x1="27" y1="85" x2="53" y2="85" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
        <!-- sparkle near cross -->
        <circle cx="57" cy="80" r="3" fill="#ff9eb5" opacity="0.6"/>
        <circle cx="23" cy="90" r="2.5" fill="#b8e6ff" opacity="0.6"/>
      </svg>
    </div>

    <!-- Trans flag -->
    <div class="sticker sticker-7" aria-hidden="true">
      <svg viewBox="0 0 90 62" fill="none">
        <defs><clipPath id="tc"><rect x="3" y="3" width="84" height="56" rx="6"/></clipPath></defs>
        <g clip-path="url(#tc)">
          <rect x="3" y="3" width="84" height="11.2" fill="#5bcefa"/>
          <rect x="3" y="14.2" width="84" height="11.2" fill="#f5a9b8"/>
          <rect x="3" y="25.4" width="84" height="11.2" fill="#fff"/>
          <rect x="3" y="36.6" width="84" height="11.2" fill="#f5a9b8"/>
          <rect x="3" y="47.8" width="84" height="11.2" fill="#5bcefa"/>
          <!-- subtle sheen -->
          <rect x="3" y="3" width="84" height="8" fill="#fff" opacity="0.15"/>
        </g>
        <rect x="3" y="3" width="84" height="56" rx="6" fill="none" stroke="#222" stroke-width="3"/>
        <!-- small white heart -->
        <path d="M75 10C75 10 71 7 71 5C71 3 72.5 2 74 2C74.8 2 75 2.8 75 3C75 2.8 75.2 2 76 2C77.5 2 79 3 79 5C79 7 75 10 75 10Z" fill="#fff" opacity="0.7"/>
      </svg>
    </div>

    <!-- Sparkle cluster -->
    <div class="sticker sticker-8" aria-hidden="true">
      <svg viewBox="0 0 90 90" fill="none">
        <!-- big star -->
        <path d="M45 8L50 34L76 39L50 44L45 70L40 44L14 39L40 34Z" fill="#ffe45d" stroke="#222" stroke-width="2.5"/>
        <!-- inner star highlight -->
        <path d="M45 22L48 36L62 39L48 42L45 56L42 42L28 39L42 36Z" fill="#fff5a0" opacity="0.6"/>
        <!-- medium star -->
        <path d="M70 60L72.5 70L82 68L74 74L77 84L70 77L63 84L66 74L58 68L67.5 70Z" fill="#ff9eb5" stroke="#222" stroke-width="1.8"/>
        <!-- small circles -->
        <circle cx="18" cy="72" r="5" fill="#b8e6ff" stroke="#222" stroke-width="1.5"/>
        <circle cx="14" cy="69" r="2.5" fill="#fff" opacity="0.5"/>
        <circle cx="72" cy="14" r="4" fill="#c1f0db" stroke="#222" stroke-width="1.3"/>
        <circle cx="20" cy="18" r="3.5" fill="#e0c3fc" stroke="#222" stroke-width="1.3"/>
        <!-- tiny sparkle dots -->
        <circle cx="83" cy="35" r="2.5" fill="#ffe45d" opacity="0.7"/>
        <circle cx="8" cy="50" r="2" fill="#ff9eb5" opacity="0.7"/>
      </svg>
    </div>

    <!-- Pink flame sticker -->
    <div class="sticker sticker-9" aria-hidden="true">
      <svg viewBox="0 0 60 90" fill="none">
        <!-- outer glow -->
        <ellipse cx="30" cy="65" rx="22" ry="18" fill="#ffb8d0" opacity="0.35"/>
        <!-- main flame body -->
        <path d="M30 85C30 85 8 68 8 50C8 36 16 28 22 22C22 22 20 32 26 34C26 34 18 20 30 8C30 8 28 22 36 26C36 26 44 20 42 10C50 18 52 32 44 46C48 42 50 36 50 30C54 40 52 58 30 85Z" fill="#ff9eb5" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
        <!-- inner lighter flame -->
        <path d="M30 72C30 72 16 58 18 46C20 38 24 34 28 30C28 30 26 36 30 38C30 38 34 32 32 24C38 30 40 40 36 50C38 47 40 42 40 38C43 44 42 58 30 72Z" fill="#ffd6e6" opacity="0.7"/>
        <!-- tip glow -->
        <ellipse cx="30" cy="16" rx="5" ry="7" fill="#ffe0ee" opacity="0.5"/>
        <!-- sparkles -->
        <circle cx="48" cy="50" r="2.5" fill="#ff6b8a" opacity="0.6"/>
        <circle cx="12" cy="45" r="2" fill="#ff9eb5" opacity="0.6"/>
        <path d="M50 30L51.5 35L56 33L52 37L54 42L50 38L46 42L48 37L44 33L48.5 35Z" fill="#ffd6e0" stroke="#222" stroke-width="1" opacity="0.8"/>
      </svg>
    </div>

    <!-- Purple flame sticker -->
    <div class="sticker sticker-10" aria-hidden="true">
      <svg viewBox="0 0 60 90" fill="none">
        <!-- outer glow -->
        <ellipse cx="30" cy="65" rx="22" ry="18" fill="#c9a0f0" opacity="0.3"/>
        <!-- main flame body -->
        <path d="M30 85C30 85 8 68 8 50C8 36 16 28 22 22C22 22 20 32 26 34C26 34 18 20 30 8C30 8 28 22 36 26C36 26 44 20 42 10C50 18 52 32 44 46C48 42 50 36 50 30C54 40 52 58 30 85Z" fill="#c084f5" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
        <!-- inner lighter flame -->
        <path d="M30 72C30 72 16 58 18 46C20 38 24 34 28 30C28 30 26 36 30 38C30 38 34 32 32 24C38 30 40 40 36 50C38 47 40 42 40 38C43 44 42 58 30 72Z" fill="#e5ccff" opacity="0.7"/>
        <!-- tip glow -->
        <ellipse cx="30" cy="16" rx="5" ry="7" fill="#f0e0ff" opacity="0.55"/>
        <!-- sparkles -->
        <circle cx="48" cy="50" r="2.5" fill="#9b59b6" opacity="0.6"/>
        <circle cx="12" cy="45" r="2" fill="#c084f5" opacity="0.6"/>
        <path d="M10 28L11.5 33L16 31L12 35L14 40L10 36L6 40L8 35L4 31L8.5 33Z" fill="#e0c3fc" stroke="#222" stroke-width="1" opacity="0.8"/>
      </svg>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <main id="mainContent">

      <!-- GIFT SECTION -->
      <section class="gift-section">
        <div class="gift-box" id="giftBox" role="button" tabindex="0" aria-label="Ouvrir le cadeau">
          <svg viewBox="0 0 160 172" fill="none">
            <rect x="20" y="82" width="120" height="82" rx="6" fill="#e0c3fc" stroke="#222" stroke-width="3"/>
            <rect x="12" y="58" width="136" height="28" rx="6" fill="#d5b8ff" stroke="#222" stroke-width="3"/>
            <rect x="72" y="58" width="16" height="106" fill="#ffd6e0" stroke="#222" stroke-width="2"/>
            <rect x="12" y="66" width="136" height="12" fill="#ffd6e0" stroke="#222" stroke-width="2"/>
            <ellipse cx="66" cy="50" rx="16" ry="12" fill="#ff9eb5" stroke="#222" stroke-width="2.5" transform="rotate(-15 66 50)"/>
            <ellipse cx="94" cy="50" rx="16" ry="12" fill="#ff9eb5" stroke="#222" stroke-width="2.5" transform="rotate(15 94 50)"/>
            <circle cx="80" cy="54" r="6" fill="#ff6b8a" stroke="#222" stroke-width="2"/>
            <path d="M66 58Q57 74 49 68" stroke="#ff9eb5" stroke-width="3" fill="none" stroke-linecap="round"/>
            <path d="M94 58Q103 74 111 68" stroke="#ff9eb5" stroke-width="3" fill="none" stroke-linecap="round"/>
            <circle cx="45" cy="120" r="4" fill="#f0d4ff" opacity="0.5"/>
            <circle cx="115" cy="112" r="3" fill="#f0d4ff" opacity="0.5"/>
            <circle cx="58" cy="145" r="3.5" fill="#f0d4ff" opacity="0.5"/>
            <circle cx="102" cy="138" r="4.5" fill="#f0d4ff" opacity="0.5"/>
          </svg>
        </div>

        <div class="envelopes hidden" id="envelopes">
          <div class="envelope-card" id="env1">
            <div class="envelope-card-inner">
              <div class="envelope-card-front">
                <svg viewBox="0 0 220 155" fill="none" preserveAspectRatio="xMidYMid meet">
                  <rect x="3" y="45" width="214" height="107" rx="8" fill="#c1f0db" stroke="#222" stroke-width="3"/>
                  <path d="M3 45L110 105L217 45" stroke="#222" stroke-width="1.5" opacity="0.15" fill="none"/>
                  <polygon points="3,45 110,5 217,45" fill="#8ddbb5" stroke="#222" stroke-width="3" stroke-linejoin="round"/>
                  <path d="M110 40C110 40 102 33 102 28C102 24 104 22 107 22C109 22 110 24 110 25C110 24 111 22 113 22C116 22 118 24 118 28C118 33 110 40 110 40Z" fill="#ff6b8a" stroke="#222" stroke-width="1.5"/>
                </svg>
              </div>
              <div class="envelope-card-back">
                <p>Un atelier pour créer ta bague en argent</p>
              </div>
            </div>
          </div>
          <div class="envelope-card" id="env2">
            <div class="envelope-card-inner">
              <div class="envelope-card-front">
                <svg viewBox="0 0 220 155" fill="none" preserveAspectRatio="xMidYMid meet">
                  <rect x="3" y="45" width="214" height="107" rx="8" fill="#ffd8be" stroke="#222" stroke-width="3"/>
                  <path d="M3 45L110 105L217 45" stroke="#222" stroke-width="1.5" opacity="0.15" fill="none"/>
                  <polygon points="3,45 110,5 217,45" fill="#ffb38a" stroke="#222" stroke-width="3" stroke-linejoin="round"/>
                  <path d="M110 40C110 40 102 33 102 28C102 24 104 22 107 22C109 22 110 24 110 25C110 24 111 22 113 22C116 22 118 24 118 28C118 33 110 40 110 40Z" fill="#b8e6ff" stroke="#222" stroke-width="1.5"/>
                </svg>
              </div>
              <div class="envelope-card-back">
                <p>Deux places pour King Kong Meuf + Parcours Santé (punk féminin) — 29 Mai</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- EVENT SECTION -->
      <section class="event-section">
        <div class="event-info">
          <span class="event-date">11 — 12 Avril</span>
          <span class="event-dot">✦</span>
          <span class="event-location">Nantes</span>
        </div>
      </section>

      <!-- PEOPLE SECTION -->
      <section class="people-section">
        <div class="people-grid">
          <div class="person-card"><div class="avatar"></div><p>Antoine B</p></div>
          <div class="person-card"><div class="avatar"></div><p>Antoine G</p></div>
          <div class="person-card"><div class="avatar"></div><p>Alice</p></div>
          <div class="person-card"><div class="avatar"></div><p>Henry</p></div>
          <div class="person-card"><div class="avatar"></div><p>Thelma</p></div>
          <div class="person-card"><div class="avatar"></div><p>Anna</p></div>
          <div class="person-card"><div class="avatar"></div><p>Sophie M</p></div>
          <div class="person-card"><div class="avatar"></div><p>Mathieu</p></div>
          <div class="person-card"><div class="avatar"></div><p>Maïlys</p></div>
          <div class="person-card"><div class="avatar"></div><p>Echo</p></div>
          <div class="person-card"><div class="avatar"></div><p>Solène</p></div>
          <div class="person-card"><div class="avatar"></div><p>Sophie C</p></div>
          <div class="person-card"><div class="avatar"></div><p>Tiffany</p></div>
        </div>
      </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
