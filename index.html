<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joyeux 30 ans Marann</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Quicksand:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- ===== OPENING ANIMATION ===== -->
    <div class="opening-overlay" id="openingOverlay">
      <div class="flames-container">
        <div class="flame flame-orange" style="--left:-3%;--w:18vw;--h:55%;--delay:0s;--dur:2s"></div>
        <div class="flame flame-pink" style="--left:7%;--w:15vw;--h:72%;--delay:0.08s;--dur:1.8s"></div>
        <div class="flame flame-yellow" style="--left:17%;--w:20vw;--h:48%;--delay:0.16s;--dur:2.2s"></div>
        <div class="flame flame-coral" style="--left:28%;--w:16vw;--h:82%;--delay:0.04s;--dur:1.9s"></div>
        <div class="flame flame-orange" style="--left:38%;--w:18vw;--h:52%;--delay:0.12s;--dur:2.1s"></div>
        <div class="flame flame-pink" style="--left:48%;--w:15vw;--h:68%;--delay:0.18s;--dur:1.7s"></div>
        <div class="flame flame-yellow" style="--left:56%;--w:20vw;--h:56%;--delay:0.02s;--dur:2.3s"></div>
        <div class="flame flame-coral" style="--left:66%;--w:17vw;--h:76%;--delay:0.1s;--dur:1.85s"></div>
        <div class="flame flame-orange" style="--left:76%;--w:16vw;--h:46%;--delay:0.14s;--dur:2s"></div>
        <div class="flame flame-pink" style="--left:86%;--w:20vw;--h:62%;--delay:0.06s;--dur:2.15s"></div>
      </div>
      <p class="opening-message" id="openingMessage">Joyeux 30 ans Marann 🎉</p>
    </div>

    <!-- ===== FLOATING STICKERS ===== -->

    <!-- Heart with "Burn Patriarchy" -->
    <div class="sticker sticker-1" aria-hidden="true">
      <svg viewBox="0 0 100 95" fill="none">
        <path d="M50 88C50 88 5 58 5 30C5 15 15 5 28 5C38 5 46 12 50 20C54 12 62 5 72 5C85 5 95 15 95 30C95 58 50 88 50 88Z" fill="#ff9eb5" stroke="#222" stroke-width="3" stroke-linejoin="round"/>
        <text x="50" y="42" text-anchor="middle" font-family="Quicksand,sans-serif" font-size="11" font-weight="700" fill="#222">Burn</text>
        <text x="50" y="56" text-anchor="middle" font-family="Quicksand,sans-serif" font-size="10" font-weight="700" fill="#222">Patriarchy</text>
      </svg>
    </div>

    <!-- ACAB with star -->
    <div class="sticker sticker-2" aria-hidden="true">
      <svg viewBox="0 0 120 50" fill="none">
        <rect x="2" y="2" width="116" height="46" rx="10" fill="#b8e6ff" stroke="#222" stroke-width="3"/>
        <text x="55" y="36" text-anchor="middle" font-family="Quicksand,sans-serif" font-size="26" font-weight="800" fill="#222">ACAB</text>
        <path d="M103 8L105 14H111L106 18L108 24L103 20L98 24L100 18L95 14H101Z" fill="#ffe45d" stroke="#222" stroke-width="1.5"/>
      </svg>
    </div>

    <!-- Raised fist -->
    <div class="sticker sticker-3" aria-hidden="true">
      <svg viewBox="0 0 60 85" fill="none">
        <rect x="18" y="52" width="24" height="30" rx="4" fill="#ffcba4" stroke="#222" stroke-width="2.5"/>
        <rect x="11" y="15" width="38" height="38" rx="10" fill="#ffcba4" stroke="#222" stroke-width="2.5"/>
        <rect x="6" y="32" width="11" height="20" rx="5.5" fill="#ffcba4" stroke="#222" stroke-width="2.5"/>
        <line x1="21" y1="20" x2="21" y2="50" stroke="#222" stroke-width="1.5" opacity="0.3"/>
        <line x1="30" y1="18" x2="30" y2="50" stroke="#222" stroke-width="1.5" opacity="0.3"/>
        <line x1="39" y1="20" x2="39" y2="50" stroke="#222" stroke-width="1.5" opacity="0.3"/>
      </svg>
    </div>

    <!-- Rainbow -->
    <div class="sticker sticker-4" aria-hidden="true">
      <svg viewBox="0 0 100 60" fill="none">
        <path d="M10 55A40 40 0 0190 55" stroke="#ff6b6b" stroke-width="7" stroke-linecap="round"/>
        <path d="M17 55A33 33 0 0183 55" stroke="#ffa500" stroke-width="7" stroke-linecap="round"/>
        <path d="M24 55A26 26 0 0176 55" stroke="#ffe45d" stroke-width="7" stroke-linecap="round"/>
        <path d="M31 55A19 19 0 0169 55" stroke="#7ddf7d" stroke-width="7" stroke-linecap="round"/>
        <path d="M38 55A12 12 0 0162 55" stroke="#5bcefa" stroke-width="7" stroke-linecap="round"/>
        <path d="M45 55A5 5 0 0155 55" stroke="#d28aff" stroke-width="7" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- Cute anarchist A -->
    <div class="sticker sticker-5" aria-hidden="true">
      <svg viewBox="0 0 70 80" fill="none">
        <circle cx="35" cy="40" r="22" fill="#ffd6e0" stroke="#222" stroke-width="3"/>
        <path d="M35 12L19 68M35 12L51 68M23 52H47" stroke="#222" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="60" cy="14" r="4" fill="#ff9eb5"/>
        <circle cx="10" cy="65" r="3.5" fill="#b8e6ff"/>
      </svg>
    </div>

    <!-- Venus symbol with fist -->
    <div class="sticker sticker-6" aria-hidden="true">
      <svg viewBox="0 0 70 100" fill="none">
        <circle cx="35" cy="32" r="24" fill="#e8b4cb" stroke="#222" stroke-width="3"/>
        <rect x="23" y="20" width="24" height="20" rx="7" fill="#ffcba4" stroke="#222" stroke-width="2"/>
        <rect x="19" y="30" width="8" height="12" rx="4" fill="#ffcba4" stroke="#222" stroke-width="2"/>
        <line x1="35" y1="56" x2="35" y2="92" stroke="#222" stroke-width="3" stroke-linecap="round"/>
        <line x1="24" y1="78" x2="46" y2="78" stroke="#222" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- Trans flag -->
    <div class="sticker sticker-7" aria-hidden="true">
      <svg viewBox="0 0 75 50" fill="none">
        <defs><clipPath id="tc"><rect x="3" y="3" width="69" height="44" rx="4"/></clipPath></defs>
        <g clip-path="url(#tc)">
          <rect x="3" y="3" width="69" height="9" fill="#5bcefa"/>
          <rect x="3" y="12" width="69" height="9" fill="#f5a9b8"/>
          <rect x="3" y="21" width="69" height="9" fill="#fff"/>
          <rect x="3" y="30" width="69" height="9" fill="#f5a9b8"/>
          <rect x="3" y="39" width="69" height="8" fill="#5bcefa"/>
        </g>
        <rect x="3" y="3" width="69" height="44" rx="4" fill="none" stroke="#222" stroke-width="3"/>
      </svg>
    </div>

    <!-- Sparkle cluster -->
    <div class="sticker sticker-8" aria-hidden="true">
      <svg viewBox="0 0 80 80" fill="none">
        <path d="M40 8L44 30L66 34L44 38L40 60L36 38L14 34L36 30Z" fill="#ffe45d" stroke="#222" stroke-width="2"/>
        <path d="M62 55L64 63L72 61L65 66L68 74L62 68L56 73L59 66L52 61L60 63Z" fill="#ff9eb5" stroke="#222" stroke-width="1.5"/>
        <circle cx="18" cy="65" r="3.5" fill="#b8e6ff" stroke="#222" stroke-width="1.2"/>
        <circle cx="65" cy="14" r="2.5" fill="#c1f0db" stroke="#222" stroke-width="1"/>
        <circle cx="20" cy="16" r="2" fill="#e0c3fc" stroke="#222" stroke-width="1"/>
      </svg>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <main id="mainContent">

      <!-- GIFT SECTION -->
      <section class="gift-section">
        <div class="gift-box" id="giftBox" role="button" tabindex="0" aria-label="Ouvrir le cadeau">
          <svg viewBox="0 0 160 172" fill="none">
            <rect x="20" y="82" width="120" height="82" rx="6" fill="#e0c3fc" stroke="#222" stroke-width="3"/>
            <rect x="12" y="58" width="136" height="28" rx="6" fill="#d5b8ff" stroke="#222" stroke-width="3"/>
            <rect x="72" y="58" width="16" height="106" fill="#ffd6e0" stroke="#222" stroke-width="2"/>
            <rect x="12" y="66" width="136" height="12" fill="#ffd6e0" stroke="#222" stroke-width="2"/>
            <ellipse cx="66" cy="50" rx="16" ry="12" fill="#ff9eb5" stroke="#222" stroke-width="2.5" transform="rotate(-15 66 50)"/>
            <ellipse cx="94" cy="50" rx="16" ry="12" fill="#ff9eb5" stroke="#222" stroke-width="2.5" transform="rotate(15 94 50)"/>
            <circle cx="80" cy="54" r="6" fill="#ff6b8a" stroke="#222" stroke-width="2"/>
            <path d="M66 58Q57 74 49 68" stroke="#ff9eb5" stroke-width="3" fill="none" stroke-linecap="round"/>
            <path d="M94 58Q103 74 111 68" stroke="#ff9eb5" stroke-width="3" fill="none" stroke-linecap="round"/>
            <circle cx="45" cy="120" r="4" fill="#f0d4ff" opacity="0.5"/>
            <circle cx="115" cy="112" r="3" fill="#f0d4ff" opacity="0.5"/>
            <circle cx="58" cy="145" r="3.5" fill="#f0d4ff" opacity="0.5"/>
            <circle cx="102" cy="138" r="4.5" fill="#f0d4ff" opacity="0.5"/>
          </svg>
        </div>

        <div class="envelopes hidden" id="envelopes">
          <div class="envelope-card" id="env1">
            <div class="envelope-card-inner">
              <div class="envelope-card-front">
                <svg viewBox="0 0 220 155" fill="none" preserveAspectRatio="xMidYMid meet">
                  <rect x="3" y="45" width="214" height="107" rx="8" fill="#c1f0db" stroke="#222" stroke-width="3"/>
                  <path d="M3 45L110 105L217 45" stroke="#222" stroke-width="1.5" opacity="0.15" fill="none"/>
                  <polygon points="3,45 110,5 217,45" fill="#8ddbb5" stroke="#222" stroke-width="3" stroke-linejoin="round"/>
                  <path d="M110 40C110 40 102 33 102 28C102 24 104 22 107 22C109 22 110 24 110 25C110 24 111 22 113 22C116 22 118 24 118 28C118 33 110 40 110 40Z" fill="#ff6b8a" stroke="#222" stroke-width="1.5"/>
                </svg>
              </div>
              <div class="envelope-card-back">
                <p>Un atelier pour créer ta bague en argent</p>
              </div>
            </div>
          </div>
          <div class="envelope-card" id="env2">
            <div class="envelope-card-inner">
              <div class="envelope-card-front">
                <svg viewBox="0 0 220 155" fill="none" preserveAspectRatio="xMidYMid meet">
                  <rect x="3" y="45" width="214" height="107" rx="8" fill="#ffd8be" stroke="#222" stroke-width="3"/>
                  <path d="M3 45L110 105L217 45" stroke="#222" stroke-width="1.5" opacity="0.15" fill="none"/>
                  <polygon points="3,45 110,5 217,45" fill="#ffb38a" stroke="#222" stroke-width="3" stroke-linejoin="round"/>
                  <path d="M110 40C110 40 102 33 102 28C102 24 104 22 107 22C109 22 110 24 110 25C110 24 111 22 113 22C116 22 118 24 118 28C118 33 110 40 110 40Z" fill="#b8e6ff" stroke="#222" stroke-width="1.5"/>
                </svg>
              </div>
              <div class="envelope-card-back">
                <p>Deux places pour King Kong Meuf + Parcours Santé (punk féminin) — 29 Mai</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- EVENT SECTION -->
      <section class="event-section">
        <div class="event-info">
          <span class="event-date">11 — 12 Avril</span>
          <span class="event-dot">✦</span>
          <span class="event-location">Nantes</span>
        </div>
      </section>

      <!-- PEOPLE SECTION -->
      <section class="people-section">
        <div class="people-grid">
          <div class="person-card"><div class="avatar"></div><p>Antoine B</p></div>
          <div class="person-card"><div class="avatar"></div><p>Antoine G</p></div>
          <div class="person-card"><div class="avatar"></div><p>Alice</p></div>
          <div class="person-card"><div class="avatar"></div><p>Henry</p></div>
          <div class="person-card"><div class="avatar"></div><p>Thelma</p></div>
          <div class="person-card"><div class="avatar"></div><p>Anna</p></div>
          <div class="person-card"><div class="avatar"></div><p>Sophie M</p></div>
          <div class="person-card"><div class="avatar"></div><p>Mathieu</p></div>
          <div class="person-card"><div class="avatar"></div><p>Maïlys</p></div>
          <div class="person-card"><div class="avatar"></div><p>Echo</p></div>
          <div class="person-card"><div class="avatar"></div><p>Solène</p></div>
          <div class="person-card"><div class="avatar"></div><p>Sophie C</p></div>
          <div class="person-card"><div class="avatar"></div><p>Tiffany</p></div>
        </div>
      </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
